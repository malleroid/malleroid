name: Lint Resume

on:
  push:
    branches: [main]
    paths:
      - "resumes/docs/**"
      - "resumes/.textlintrc"
  pull_request:
    paths:
      - "resumes/docs/**"
      - "resumes/.textlintrc"

jobs:
  textlint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resumes
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: resumes/package.json
      - run: npm ci
      - run: npm run lint
