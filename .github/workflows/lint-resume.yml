name: Lint Resume

on:
  push:
    branches: [main]
    paths:
      - "resumes/docs/**"
      - "resumes/.textlintrc"
  pull_request:
    paths:
      - "resumes/docs/**"
      - "resumes/.textlintrc"

jobs:
  textlint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resumes
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: resumes/package.json
      - run: npm ci
      - run: npm run lint
