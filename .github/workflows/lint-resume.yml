name: Lint Resume

on:
  push:
    branches: [main]
    paths:
      - "resumes/docs/**"
      - "resumes/.textlintrc"
  pull_request:
    paths:
      - "resumes/docs/**"
      - "resumes/.textlintrc"

jobs:
  textlint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resumes
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: resumes/package.json
      - run: npm ci
      - run: npm run lint
